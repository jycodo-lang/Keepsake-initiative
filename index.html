<style>
   :root{
   --bg:#050816;
   --bg2:#0B1020;
   --surface: rgba(15,23,42,0.88);
   --stroke: rgba(148,163,184,0.18);
   --text: rgba(248,250,252,0.96);
   --muted: rgba(226,232,240,0.78);
   --muted2: rgba(203,213,225,0.62);
   --accent:#8B5CF6;
   --accent2:#22D3EE;
   --radius:18px;
   --shadow: 0 18px 48px rgba(0,0,0,0.42);
   --shadow2: 0 10px 28px rgba(0,0,0,0.28);
   --max: 1140px;
   --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
   }
   *{box-sizing:border-box}
   html,body{height:100%}
   body{
   margin:0;
   font-family:var(--font);
   color:var(--text);
   background:
   radial-gradient(900px 520px at 10% 0%, rgba(139,92,246,0.20), transparent 60%),
   radial-gradient(800px 520px at 90% 20%, rgba(34,211,238,0.14), transparent 55%),
   linear-gradient(180deg, var(--bg2), var(--bg));
   overflow-x:hidden;
   }
   a{color:var(--accent2); text-decoration:none}
   a:hover{text-decoration:underline; text-underline-offset:3px}
   .container{ width:min(var(--max), calc(100% - 32px)); margin:0 auto; }
   header.nav{
   position:sticky; top:0; z-index:50;
   background: rgba(8,12,26,0.84);
   border-bottom: 1px solid var(--stroke);
   backdrop-filter: blur(12px);
   }
   .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding: 14px 0; gap:14px; }
   .brand{
   display:flex; align-items:center; gap:12px;
   color:var(--text); text-decoration:none;
   min-width: 240px;
   }
   .brand img{
   width:44px; height:44px; border-radius:14px;
   border:1px solid var(--stroke);
   box-shadow: var(--shadow2);
   background: rgba(255,255,255,0.04);
   object-fit:cover;
   }
   .brand-title{ font-weight: 900; letter-spacing:-0.2px; line-height:1.1; }
   .brand-sub{ color:var(--muted2); font-size:12.5px; margin-top:2px; }
   nav.links{ display:flex; gap:16px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }
   nav.links a{
   color:var(--muted);
   font-weight:800;
   padding: 6px 0;
   border-bottom: 2px solid transparent;
   white-space:nowrap;
   }
   nav.links a.active{
   color:var(--text);
   border-bottom-color: rgba(139,92,246,0.55);
   }
   .nav-actions{ display:flex; gap:10px; align-items:center; }
   .btn{
   border:1px solid var(--stroke);
   background: rgba(255,255,255,0.04);
   color: var(--text);
   padding: 10px 14px;
   border-radius: 14px;
   cursor:pointer;
   font-weight: 900;
   box-shadow: var(--shadow2);
   display:inline-flex;
   align-items:center;
   justify-content:center;
   gap:8px;
   }
   .btn:hover{ transform: translateY(-1px); }
   .btn:active{ transform: translateY(0px); }
   .btn.primary{
   border-color: rgba(139,92,246,0.35);
   background: linear-gradient(135deg, rgba(139,92,246,0.95), rgba(34,211,238,0.78));
   color: #F8FAFC;
   box-shadow: 0 16px 32px rgba(34,211,238,0.14);
   }
   .btn.ghost{ background: rgba(255,255,255,0.03); box-shadow:none; }
   main{ padding: 26px 0 0; }
   .page{ display:none; }
   .page.active{ display:block; }
   .card{
   background: var(--surface);
   border: 1px solid var(--stroke);
   border-radius: var(--radius);
   box-shadow: var(--shadow);
   }
   .card.pad{ padding: 18px; }
   h1{
   margin:0 0 10px;
   font-size: clamp(28px, 3.6vw, 44px);
   line-height: 1.08;
   letter-spacing: -0.6px;
   color: var(--text);
   }
   h2{ margin:0 0 8px; font-size:20px; letter-spacing:-0.2px; color: var(--text); }
   h3{ margin:0 0 6px; font-size:16px; letter-spacing:-0.1px; color: var(--text); }
   p{ margin: 0 0 10px; color: var(--muted); line-height:1.65; font-size:16px; }
   .lead{ font-size: 16.5px; color: rgba(241,245,249,0.86); }
   .hero-grid{
   display:grid;
   grid-template-columns: 1.25fr 0.75fr;
   gap: 16px;
   align-items: stretch;
   }
   @media (max-width: 980px){
   .hero-grid{ grid-template-columns: 1fr; }
   .brand-sub{ display:none; }
   nav.links{ gap:12px; }
   }
   .meta{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
   .tag{
   display:inline-flex; align-items:center; gap:8px;
   padding: 8px 10px;
   border-radius: 999px;
   background: rgba(139,92,246,0.14);
   border: 1px solid rgba(139,92,246,0.24);
   color: rgba(241,245,249,0.92);
   font-weight: 900;
   font-size: 13px;
   }
   .two{
   display:grid;
   grid-template-columns: 1fr 1fr;
   gap: 14px;
   align-items:start;
   margin-top: 12px;
   }
   @media (max-width: 900px){
   .two{ grid-template-columns:1fr; }
   }
   hr.sep{ border:none; height:1px; background: var(--stroke); margin: 14px 0; }
   .info{
   padding: 14px;
   border-radius: 16px;
   border: 1px solid var(--stroke);
   background: rgba(15,23,42,0.72);
   box-shadow: var(--shadow2);
   }
   .info p{ margin:0 0 10px; }
   .info p:last-child{ margin-bottom:0; }
   ul.clean{
   margin: 10px 0 0;
   padding-left: 18px;
   color: var(--muted);
   line-height:1.65;
   }
   ul.clean li{ margin: 6px 0; }
   form{ display:grid; gap: 10px; }
   label{
   font-weight: 900;
   font-size: 13px;
   color: rgba(241,245,249,0.90);
   display:block;
   margin-bottom: 6px;
   }
   input, textarea, select{
   width:100%;
   padding: 11px 12px;
   border-radius: 14px;
   border: 1px solid var(--stroke);
   background: rgba(2,6,23,0.78);
   outline:none;
   color: var(--text);
   font-size: 15px;
   }
   input::placeholder, textarea::placeholder{ color: rgba(203,213,225,0.46); }
   textarea{ min-height: 120px; resize: vertical; }
   .row{
   display:grid;
   grid-template-columns: 1fr 1fr;
   gap: 10px;
   }
   @media (max-width: 700px){
   .row{ grid-template-columns:1fr; }
   }
   .footer{
   margin-top: 28px;
   padding: 22px 0 36px;
   border-top: 1px solid var(--stroke);
   color:var(--muted2);
   font-size: 14px;
   }
   .toast{
   position: fixed;
   bottom: 16px;
   left: 50%;
   transform: translateX(-50%);
   background: rgba(2,6,23,0.96);
   color: white;
   padding: 12px 14px;
   border-radius: 16px;
   box-shadow: var(--shadow);
   display:none;
   max-width: min(600px, calc(100% - 24px));
   z-index: 999;
   border: 1px solid var(--stroke);
   }
   details{
   border: 1px solid var(--stroke);
   border-radius: 16px;
   background: rgba(15,23,42,0.70);
   padding: 12px;
   }
   summary{
   cursor:pointer;
   font-weight: 900;
   color: rgba(241,245,249,0.92);
   list-style: none;
   }
   summary::-webkit-details-marker{ display:none; }
   .list{ display:grid; gap: 10px; margin-top: 12px; }
   .article-card{
   padding: 14px;
   border-radius: 16px;
   border: 1px solid var(--stroke);
   background: rgba(15,23,42,0.74);
   box-shadow: var(--shadow2);
   }
   .article-card h3{ margin:0 0 6px; }
   .article-meta{ color: var(--muted2); font-size: 13px; margin-bottom: 10px; }
   .small{ color: var(--muted2); font-size: 13px; }
   .pill{
   display:inline-flex;
   align-items:center;
   padding: 6px 10px;
   border-radius: 999px;
   border: 1px solid rgba(139,92,246,0.28);
   background: rgba(139,92,246,0.12);
   font-weight: 900;
   font-size: 12.5px;
   color: rgba(241,245,249,0.92);
   }
   .team-grid{
   display:grid;
   grid-template-columns: repeat(3, 1fr);
   gap: 14px;
   margin-top: 12px;
   }
   @media (max-width: 960px){
   .team-grid{ grid-template-columns:1fr; }
   }
   .team-card{
   padding: 14px;
   border-radius: 16px;
   border: 1px solid var(--stroke);
   background: rgba(15,23,42,0.74);
   box-shadow: var(--shadow2);
   text-align:center;
   }
   .team-photo{
   width: 100%;
   max-width: 280px;
   height: 280px;
   object-fit: cover;
   border-radius: 18px;
   border: 1px solid var(--stroke);
   box-shadow: var(--shadow2);
   background: rgba(255,255,255,0.04);
   display:block;
   margin: 0 auto 12px;
   }
   @media (max-width: 520px){
   .team-photo{ max-width: 240px; height: 240px; }
   }
   .team-name{ font-weight: 900; color: var(--text); }
   .team-roleline{ margin-top: 4px; font-size: 13px; color: var(--muted2); font-weight: 800; }
   .team-desc{ margin-top: 10px; }

   .stars{
     display:flex;
     gap:6px;
     align-items:center;
     user-select:none;
   }
   .star-btn{
     width:40px;
     height:40px;
     border-radius: 12px;
     border:1px solid var(--stroke);
     background: rgba(15,23,42,0.92);
     cursor:pointer;
     display:grid;
     place-items:center;
     font-size: 20px;
     box-shadow: var(--shadow2);
     line-height:1;
     color: rgba(241,245,249,0.92);
   }
   .star-btn:hover{ transform: translateY(-1px); }
   .star-btn:active{ transform: translateY(0px); }
   .star-btn.on{
     border-color: rgba(139,92,246,0.40);
     background: rgba(139,92,246,0.18);
   }
   .star-help{
     color: var(--muted2);
     font-size: 13px;
     margin-top: 6px;
   }
</style>
